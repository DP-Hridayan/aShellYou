name: Build and Release Alpha APK

on:
  push:
    tags:
      - "v*-debug*"
      - "v*-alpha*"
      - "v*-beta*"

jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Set Environment Variables
        run: |
          echo "KEYSTORE_PATH=$PWD/keystore.jks" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=$(echo -n '${{ secrets.KEYSTORE_PASSWORD }}')" >> $GITHUB_ENV
          echo "KEY_ALIAS=$(echo -n '${{ secrets.KEY_ALIAS }}')" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$(echo -n '${{ secrets.KEY_PASSWORD }}')" >> $GITHUB_ENV

      - name: Grant Execute Permission to Gradle
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleGithubRelease --stacktrace

      - name: Upload APKs as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Signed-APKs
          path: app/build/outputs/apk/github/release/*.apk

  release:
    name: Create GitHub Pre-release
    needs: build
    if: startsWith(github.ref, 'refs/tags/alpha-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Download Signed APKs
        uses: actions/download-artifact@v8
        with:
          name: Signed-APKs
          path: artifacts/

      - name: Publish GitHub Pre-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILES=$(find artifacts -name "*.apk")

          if [ -z "$APK_FILES" ]; then
            echo "❌ No APKs found!"
            exit 1
          fi

          echo "✅ Found APKs:"
          echo "$APK_FILES"

          gh release create "${{ github.ref_name }}" \
            $APK_FILES \
            --title "aShell You ${{ github.ref_name }}" \
            --notes-file .github/prerelease-notes.md \
            --prerelease