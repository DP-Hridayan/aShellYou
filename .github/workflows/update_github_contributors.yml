name: Update GitHub Contributors

on:
  workflow_dispatch:

  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare directories
        run: |
          mkdir -p app/src/main/assets/github
          mkdir -p app/src/main/assets/github/contributors_pfp

      - name: Clean old contributor profile pictures
        run: |
          rm -rf app/src/main/assets/github/contributors_pfp/*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick jq

      - name: Generate contributors JSON and download avatars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          JSON_FILE="app/src/main/assets/github/contributors.json"

          RAW_FILE="$RUNNER_TEMP/contributors_raw.json"
          USER_FILE="$RUNNER_TEMP/user.json"
          AVATAR_FILE="$RUNNER_TEMP/avatar.png"

          # Fetch contributors using authenticated request
          curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/DP-Hridayan/aShellYou/contributors \
            -o "$RAW_FILE"

          echo "[" > "$JSON_FILE"

          FIRST=true

          jq -c '
            map(select(.type == "User"))
            | sort_by(-.contributions)
            | .[]
          ' "$RAW_FILE" | while read -r user; do

            USERNAME=$(echo "$user" | jq -r '.login')
            PROFILE_URL=$(echo "$user" | jq -r '.html_url')
            AVATAR_URL=$(echo "$user" | jq -r '.avatar_url')
            CONTRIBUTIONS=$(echo "$user" | jq -r '.contributions')
            USER_ID=$(echo "$user" | jq -r '.id')

            # Fetch user details
            curl -s \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/users/$USERNAME" \
              -o "$USER_FILE"

            NAME=$(jq -r '.name // empty' "$USER_FILE")

            # Fallback to username
            if [ -z "$NAME" ]; then
              NAME="$USERNAME"
            fi

            AVATAR_PATH="github/contributors_pfp/contributor_${USER_ID}.webp"

            # Download avatar
            curl -L -s "$AVATAR_URL" -o "$AVATAR_FILE"

            # Convert to optimized webp
            convert "$AVATAR_FILE" \
              -resize 128x128 \
              -strip \
              -quality 85 \
              "app/src/main/assets/${AVATAR_PATH}"

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> "$JSON_FILE"
            fi

            jq -n \
              --arg name "$NAME" \
              --arg username "$USERNAME" \
              --arg profileUrl "$PROFILE_URL" \
              --arg avatar "$AVATAR_PATH" \
              --argjson contributions "$CONTRIBUTIONS" \
              '{
                name: $name,
                username: $username,
                profileUrl: $profileUrl,
                avatar: $avatar,
                contributions: $contributions
              }' >> "$JSON_FILE"

          done

          echo "]" >> "$JSON_FILE"

          # Pretty format JSON
          jq '.' "$JSON_FILE" > "$JSON_FILE.tmp"
          mv "$JSON_FILE.tmp" "$JSON_FILE"

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.verify-changed-files.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "[skip ci] Update contributors"
          title: "Update GitHub contributors"
          body: |
            Automated update of GitHub contributors and profile pictures.
          branch: automated/update-contributors
          delete-branch: true