name: Update GitHub Contributors

on:
  workflow_dispatch:

  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"

permissions:
  contents: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare directories
        run: |
          mkdir -p app/src/main/assets/github
          mkdir -p app/src/main/assets/github/contributors_pfp

      - name: Clean old contributor profile pictures
        run: |
          rm -rf app/src/main/assets/github/contributors_pfp/*

      - name: Fetch contributors from GitHub API
        run: |
          curl -s \
            https://api.github.com/repos/DP-Hridayan/aShellYou/contributors \
            -o contributors_raw.json

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Generate contributors JSON and download avatars
        run: |
          JSON_FILE="app/src/main/assets/github/contributors.json"

          echo "[" > "$JSON_FILE"

          FIRST=true

          jq -c '
            map(select(.type == "User"))
            | sort_by(-.contributions)
            | .[]
          ' contributors_raw.json | while read user; do

            USERNAME=$(echo "$user" | jq -r '.login')
            PROFILE_URL=$(echo "$user" | jq -r '.html_url')
            AVATAR_URL=$(echo "$user" | jq -r '.avatar_url')
            CONTRIBUTIONS=$(echo "$user" | jq -r '.contributions')
            USER_ID=$(echo "$user" | jq -r '.id')

            AVATAR_PATH="github/contributors_pfp/contributor_${USER_ID}.webp"

            # Download avatar
            curl -L "$AVATAR_URL" -o temp_avatar.png

            # Convert avatar to optimized webp
            magick temp_avatar.png \
              -resize 128x128 \
              -strip \
              -quality 85 \
              "app/src/main/assets/${AVATAR_PATH}"

            rm temp_avatar.png

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              echo "," >> "$JSON_FILE"
            fi

            printf '{
              "name": "%s",
              "username": "%s",
              "profileUrl": "%s",
              "avatar": "%s",
              "contributions": %s
            }' \
            "$USERNAME" \
            "$USERNAME" \
            "$PROFILE_URL" \
            "$AVATAR_PATH" \
            "$CONTRIBUTIONS" >> "$JSON_FILE"

          done

          echo "]" >> "$JSON_FILE"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add app/src/main/assets/github/contributors.json
          git add app/src/main/assets/github/contributors_pfp/

          if git diff --cached --quiet; then
            echo "No contributor changes detected."
          else
            git commit -m "[skip ci] Update contributors"
            git push
          fi