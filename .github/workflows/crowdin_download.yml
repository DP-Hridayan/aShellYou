name: Crowdin Download

on:
  schedule:
    - cron: '0 0 * * 0'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  synchronize-with-crowdin:
    name: Download translations from Crowdin
    if: github.repository_owner == 'DP-Hridayan'
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare asset directories
        run: |
          mkdir -p app/src/main/assets/crowdin
          mkdir -p app/src/main/assets/crowdin/contributors_pfp

      - name: Clean old Crowdin contributor profile pictures
        run: |
          rm -rf app/src/main/assets/crowdin/contributors_pfp/*

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick jq

      - name: Generate translators table
        id: translators
        uses: andrii-bodnar/action-crowdin-contributors@v3.2.0
        with:
          contributors_per_line: 6
          max_contributors: 500
          image_size: 32
          min_words_contributed: 1
          files: ./docs/translators.md
          crowdin_project_link: 'https://crowdin.com/project/ashellyou'
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Save translators in assets
        run: |
          printf '%s\n' '${{ steps.translators.outputs.json_report }}' \
            > ./app/src/main/assets/crowdin/translators.json

      - name: Download Crowdin contributor profile pictures
        run: |
          set -e

          INPUT_FILE="./app/src/main/assets/crowdin/translators.json"
          TEMP_AVATAR="$RUNNER_TEMP/avatar.jpg"

          jq -c '.[]' "$INPUT_FILE" | while read -r contributor; do

            USER_ID=$(echo "$contributor" | jq -r '.id')
            PICTURE_URL=$(echo "$contributor" | jq -r '.picture')

            if [ "$PICTURE_URL" = "null" ] || [ -z "$PICTURE_URL" ]; then
              continue
            fi

            AVATAR_PATH="app/src/main/assets/crowdin/contributors_pfp/contributor_${USER_ID}.webp"

            curl -L -s "$PICTURE_URL" -o "$TEMP_AVATAR"

            convert "$TEMP_AVATAR" \
              -resize 128x128 \
              -strip \
              -quality 85 \
              "$AVATAR_PATH"

          done

      - name: Inject local avatar paths into translators JSON
        run: |
          INPUT_FILE="./app/src/main/assets/crowdin/translators.json"
          TEMP_FILE="$RUNNER_TEMP/translators_temp.json"

          jq '
            map(
              . + {
                avatar:
                  (
                    "crowdin/contributors_pfp/contributor_" +
                    .id +
                    ".webp"
                  )
              }
            )
          ' "$INPUT_FILE" > "$TEMP_FILE"

          mv "$TEMP_FILE" "$INPUT_FILE"

      - name: Fetch translation progress
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.CROWDIN_PERSONAL_TOKEN }}" \
            "https://api.crowdin.com/api/v2/projects/${{ secrets.CROWDIN_PROJECT_ID }}/languages/progress?limit=500" \
            -o "$RUNNER_TEMP/crowdin_progress_raw.json"

      - name: Generate translation progress JSON
        run: |
          OUTPUT_FILE="./app/src/main/assets/crowdin/translation_progress.json"

          jq '
            [
              .data[] |
              {
                languageId: .data.languageId,
                languageName: .data.language.name,
                androidCode: .data.language.androidCode,
                editorCode: .data.language.editorCode,
                locale: .data.language.locale,
                translationProgress: .data.translationProgress,
                approvalProgress: .data.approvalProgress
              }
            ]
          ' "$RUNNER_TEMP/crowdin_progress_raw.json" > "$OUTPUT_FILE"

      - name: Download translations
        uses: crowdin/github-action@v2
        with:
          upload_translations: false
          upload_sources: false
          download_translations: true
          localization_branch_name: localization
          create_pull_request: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}