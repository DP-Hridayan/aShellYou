// This file is for fixing legacy update checker v6.1.0 and earlier releases which used a very messy method for checking updates(even I don't know what I was doing back then).
// Old versions basically downloaded the build.gradle and compared the version code with installed app to check for updates. Yeah, I know it sounds bad already!

